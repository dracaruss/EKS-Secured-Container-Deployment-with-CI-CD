# Default deny all ingress in osticket namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: osticket
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Default deny all ingress in database namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow osticket pods to receive traffic from the load balancer
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-osticket-ingress
  namespace: osticket
spec:
  podSelector:
    matchLabels:
      app: osticket
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
---
# Allow MySQL to receive traffic ONLY from osticket namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mysql-from-osticket
  namespace: database
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app: osticket
      ports:
        - port: 3306
---
# Default deny all egress in database namespace
# MySQL should not initiate outbound connections
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# Allow MySQL DNS resolution only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: database
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

