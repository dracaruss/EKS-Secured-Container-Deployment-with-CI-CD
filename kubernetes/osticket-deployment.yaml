apiVersion: apps/v1
kind: Deployment
metadata:
  name: osticket
  namespace: osticket
  labels:
    app: osticket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: osticket
  template:
    metadata:
      labels:
        app: osticket
    spec:
      containers:
        - name: osticket
          image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/osticket:v1
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
