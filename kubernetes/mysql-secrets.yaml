apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: database
type: Opaque
data:
  # base64 encoded values - change these
  # echo -n 'osticket' | base64
  mysql-database: b3N0aWNrZXQ=


  # echo -n 'osticket' | base64
  mysql-user: b3N0aWNrZXQ=


  # echo -n 'changeme' | base64
  mysql-password: Y2hhbmdlbWU=


  # echo -n 'rootchangeme' | base64
  mysql-root-password: cm9vdGNoYW5nZW1l
